<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectAutomata</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            bg:      '#fff',
            panel:   '#f7f7f7',
            surface: '#fdfdfd',
            card:    '#fff',
            border:  '#d1d5db',
            'border-hi': '#b0b4ba',
            black:    '#111',
            white:    '#fff',
            gray:     '#444',
          },
          fontSize: {
            xs: ['0.85rem', '1.2'],
            sm: ['1rem', '1.4'],
            base: ['1.15rem', '1.5'],
            lg: ['1.35rem', '1.5'],
            xl: ['1.7rem', '1.2'],
            '2xl': ['2.2rem', '1.1'],
          },
          animation: {
            'pulse-dot': 'pulse-dot 2s ease-in-out infinite',
            'cell-glow': 'cell-glow 2s ease-in-out infinite',
          },
          keyframes: {
            'pulse-dot': {
              '0%,100%': { opacity: '1' },
              '50%': { opacity: '0.4' },
            },
            'cell-glow': {
              '0%,100%': { boxShadow: '0 0 8px rgba(37,99,235,0.3)' },
              '50%': { boxShadow: '0 0 20px rgba(37,99,235,0.6)' },
            },
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #fff; color: #111; }
    body.cli-open main > section:first-child { justify-content: flex-start; }
    #doc-panel { transform: translateX(-100%); }
    #doc-panel.doc-open { transform: translateX(0); }
    .cell { transition: background 150ms ease, border-color 150ms ease; }
    .cell.robot { animation: cell-glow 2s ease-in-out infinite; }
    @keyframes cell-glow {
      0%,100% { box-shadow: 0 0 8px rgba(37,99,235,0.35); }
      50%      { box-shadow: 0 0 22px rgba(37,99,235,0.65); }
    }
    .log-line { animation: fadein 0.2s ease forwards; }
    @keyframes fadein { from { opacity:0; transform:translateX(-4px); } to { opacity:1; transform:none; } }
    #log-output::-webkit-scrollbar { width: 4px; }
    #log-output::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    #log-output { scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .dpad-btn:active { transform: scale(0.92); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
    input::placeholder { color: #333; }
    input:focus { outline: none; }
  </style>
</head>
  <body class="text-black font-sans flex flex-col h-dvh overflow-hidden bg-bg">

  <!-- TOP BAR -->
  <header class="flex items-center justify-between px-3 sm:px-4 md:px-8 h-14 sm:h-16 bg-panel border-b border-border flex-shrink-0">
    <div class="flex items-center gap-3">
      <button
        id="toggle-doc-btn"
        type="button"
        aria-expanded="false"
        aria-controls="doc-panel"
        aria-label="Open document panel"
        class="inline-flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-md border border-border text-gray hover:text-black hover:border-gray transition-colors"
      >
        <svg viewBox="0 0 24 24" class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="text-2xl sm:text-xl font-extrabold tracking-wide sm:tracking-widest align-middle">ProjectAutomata</span>
    </div>
    <div class="flex items-center gap-2 sm:gap-4">
      <button
        id="open-cli-btn"
        type="button"
        aria-expanded="false"
        aria-label="Open command line interface"
        class="inline-flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-md border border-border text-gray hover:text-black hover:border-gray transition-colors"
      >
        <svg viewBox="0 0 24 24" class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M4 6h16v12H4z"/>
          <path d="M7 10l2 2-2 2"/>
          <path d="M11 14h6"/>
        </svg>
      </button>
      <a
        href="https://github.com/CRayuth/project_automata"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open GitHub profile"
        class="inline-flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 rounded-md border border-border text-gray hover:text-black hover:border-gray transition-colors"
      >
        <svg viewBox="0 0 24 24" class="w-5 h-5" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.477 2 2 6.486 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.009-.866-.014-1.7-2.782.605-3.369-1.343-3.369-1.343-.455-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.53 2.341 1.088 2.91.832.091-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.03-2.688-.103-.253-.447-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.547 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.31.678.921.678 1.857 0 1.339-.012 2.419-.012 2.747 0 .269.18.58.688.481A10.02 10.02 0 0 0 22 12.017C22 6.486 17.523 2 12 2z"/>
        </svg>
      </a>
    </div>
  </header>

  <aside id="doc-panel" class="fixed top-14 sm:top-16 left-0 bottom-0 z-40 w-64 sm:w-72 border-r border-border bg-white shadow-lg transition-transform duration-200 ease-out">
    <div class="px-4 py-3 border-b border-border bg-surface">
      <span class="text-xs sm:text-sm font-bold uppercase tracking-widest text-gray">Panel</span>
    </div>
    <div class="px-4 py-3 flex flex-col gap-2">
      <a href="index.html" class="block rounded-md border border-border bg-panel px-3 py-2 text-sm sm:text-base font-semibold text-black hover:bg-surface transition-colors">Main Page</a>
      <a href="document.html" class="block rounded-md border border-border bg-panel px-3 py-2 text-sm sm:text-base font-semibold text-black hover:bg-surface transition-colors">Document</a>
      <a href="team.html" class="block rounded-md border border-border bg-panel px-3 py-2 text-sm sm:text-base font-semibold text-black hover:bg-surface transition-colors">Team</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex flex-1 flex-col lg:flex-row overflow-hidden w-full min-h-0">

    <!-- LEFT: Grid -->
    <section class="flex-none basis-[42%] sm:basis-[45%] lg:flex-1 lg:basis-auto min-h-0 flex flex-col items-center justify-center border-b lg:border-b-0 lg:border-r border-border bg-panel py-2 sm:py-3 md:py-6 w-full overflow-hidden">

      <div class="flex-1 min-h-0 flex items-center justify-center p-1.5 sm:p-2 md:p-4 lg:p-6 w-full">
        <div id="grid-container"
          class="grid gap-[3px] sm:gap-[4px] md:gap-[6px] bg-surface border border-border p-1.5 sm:p-2 md:p-4 rounded-xl md:rounded-2xl shadow-lg w-full max-w-[96vw] md:max-w-[700px]"
          style="grid-template-columns: repeat(8, minmax(32px, 1fr)); grid-template-rows: repeat(8, minmax(32px, 1fr)); min-width:0; min-height:0; aspect-ratio: 1 / 1;">
        </div>
      </div>

      <!-- Coord bar -->
      <div class="w-full border-t border-border bg-panel px-1.5 sm:px-2 md:px-8 py-1.5 sm:py-2 md:py-4">
        <div class="mx-auto grid w-full max-w-3xl grid-cols-2 sm:grid-cols-4 border border-border overflow-hidden">
          <div class="flex items-center justify-center gap-1.5 sm:gap-2 px-2 sm:px-3 py-1.5 sm:py-2 md:py-3 border-r border-b sm:border-b-0 border-border">
            <span class="text-sm sm:text-base font-bold font-mono uppercase tracking-wide sm:tracking-widest text-gray">X</span>
            <span id="coord-x" class="text-base sm:text-lg font-extrabold font-mono min-w-[2rem] sm:min-w-[2.5rem]">0</span>
          </div>
          <div class="flex items-center justify-center gap-1.5 sm:gap-2 px-2 sm:px-3 py-1.5 sm:py-2 md:py-3 border-b sm:border-b-0 sm:border-r border-border">
            <span class="text-sm sm:text-base font-bold font-mono uppercase tracking-wide sm:tracking-widest text-gray">Y</span>
            <span id="coord-y" class="text-base sm:text-lg font-extrabold font-mono min-w-[2rem] sm:min-w-[2.5rem]">0</span>
          </div>
          <div class="flex items-center justify-center gap-1.5 sm:gap-2 px-2 sm:px-3 py-1.5 sm:py-2 md:py-3 border-r border-border">
            <span class="text-sm sm:text-base font-bold font-mono uppercase tracking-wide sm:tracking-widest text-gray">DIR</span>
            <span id="coord-dir" class="text-base sm:text-lg font-extrabold font-mono min-w-[3.2rem] sm:min-w-[4rem]">NORTH</span>
          </div>
          <div class="flex items-center justify-center gap-1.5 sm:gap-2 px-2 sm:px-3 py-1.5 sm:py-2 md:py-3">
            <span class="text-sm sm:text-base font-bold font-mono uppercase tracking-wide sm:tracking-widest text-gray">STEPS</span>
            <span id="coord-steps" class="text-base sm:text-lg font-extrabold font-mono min-w-[2rem] sm:min-w-[2.5rem]">0</span>
          </div>
        </div>
      </div>
    </section>

    <!-- RIGHT: Sidebar -->
    <aside class="flex-1 lg:flex-none w-full lg:w-96 min-h-0 flex flex-col bg-panel flex-shrink-0 overflow-y-auto">

      <!-- Stat cards -->
      <div class="border-b border-border">
        <div class="px-6 py-4 border-b border-border">
          <span class="text-lg font-extrabold uppercase tracking-widest text-gray">Unit Status</span>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-px bg-border p-px">
          <div class="p-3 md:p-5 bg-card">
            <div class="text-base uppercase tracking-widest text-gray mb-2">Energy</div>
            <div id="stat-energy" class="text-2xl font-extrabold font-mono text-green-600 mb-3">3/3</div>
            <div class="flex items-center gap-2">
              <span id="energy-dot-1" class="w-3 h-3 rounded-full bg-green-500"></span>
              <span id="energy-dot-2" class="w-3 h-3 rounded-full bg-green-500"></span>
              <span id="energy-dot-3" class="w-3 h-3 rounded-full bg-green-500"></span>
            </div>
          </div>
          <div class="p-3 md:p-5 bg-card">
            <div class="text-base uppercase tracking-widest text-gray mb-2">Signal</div>
            <div class="text-2xl font-extrabold font-mono text-green-500 mb-3">95%</div>
            <div class="h-[6px] bg-border rounded-full overflow-hidden">
              <div class="h-full bg-green-500 rounded-full" style="width:95%"></div>
            </div>
          </div>
          <div class="p-3 md:p-5 bg-card">
            <div class="text-base uppercase tracking-widest text-gray mb-2">Commands</div>
            <div id="stat-cmds" class="text-2xl font-extrabold font-mono">0</div>
          </div>
          <div class="p-3 md:p-5 bg-card">
            <div class="text-base uppercase tracking-widest text-gray mb-2">Errors</div>
            <div id="stat-errs" class="text-2xl font-extrabold font-mono text-red-500">0</div>
          </div>
        </div>
      </div>

      <!-- Command input -->
      <div class="border-b border-border p-3 md:p-5 flex flex-col gap-3">

        <!-- D-pad -->
        <div class="flex flex-col items-center gap-2 pt-2 rounded-xl border border-border bg-card/40 p-2">
          <div class="flex gap-2">
            <button class="dpad-btn w-11 h-11 md:w-14 md:h-14 bg-surface border border-border-hi text-gray hover:bg-border-hi hover:text-black rounded-lg text-lg md:text-xl font-mono transition-all" data-cmd="UP">🔼</button>
          </div>
          <div class="flex gap-2">
            <button class="dpad-btn w-11 h-11 md:w-14 md:h-14 bg-surface border border-border-hi text-gray hover:bg-border-hi hover:text-black rounded-lg text-lg md:text-xl transition-all" data-cmd="LEFT">◀️</button>
            <button class="dpad-btn w-11 h-11 md:w-14 md:h-14 bg-card border border-border text-gray hover:bg-border-hi hover:text-black rounded-lg text-lg md:text-xl transition-all" data-cmd="RESET">🛑</button>
            <button class="dpad-btn w-11 h-11 md:w-14 md:h-14 bg-surface border border-border-hi text-gray hover:bg-border-hi hover:text-black rounded-lg text-lg md:text-xl transition-all" data-cmd="RIGHT">▶️</button>
          </div>
          <div class="flex gap-2">
            <button class="dpad-btn w-11 h-11 md:w-14 md:h-14 bg-surface border border-border-hi text-gray hover:bg-border-hi hover:text-black rounded-lg text-lg md:text-xl transition-all" data-cmd="DOWN">🔽</button>
          </div>
          <div class="flex gap-2 pt-0.5">
            <button class="dpad-btn px-3 md:px-4 h-9 md:h-10 bg-surface border border-border-hi text-gray hover:bg-border-hi hover:text-black rounded-lg text-sm font-bold transition-all" data-cmd="PICK">PICK</button>
            <button class="dpad-btn px-3 md:px-4 h-9 md:h-10 bg-surface border border-border-hi text-gray hover:bg-border-hi hover:text-black rounded-lg text-sm font-bold transition-all" data-cmd="DROP">DROP</button>
            <button id="recharge-btn" class="dpad-btn px-3 md:px-4 h-9 md:h-10 bg-card border border-border-hi text-gray hover:bg-border-hi hover:text-black rounded-lg text-sm font-bold transition-all" data-cmd="RECHARGE">RECHARGE</button>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-2.5">
          <button id="run-btn" class="btn-run w-full sm:flex-1 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white text-lg font-bold py-2.5 rounded-xl transition-colors shadow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5l9 5.5-9 5.5V2.5z"/></svg>
            <span id="run-label">Execute</span>
          </button>
          <button id="reset-btn" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-red-600 hover:bg-red-500 text-white text-lg font-bold px-6 py-2.5 rounded-xl transition-colors shadow">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.5a.5.5 0 0 1 .5.5v2.793l1.646-1.647a.5.5 0 0 1 .708.708l-2.5 2.5a.5.5 0 0 1-.708 0l-2.5-2.5a.5.5 0 1 1 .708-.708L7.5 7.793V5a.5.5 0 0 1 .5-.5z"/></svg>
            Reset
          </button>
        </div>
      </div>


    </aside>
  </main>

  <section id="cli-panel" class="hidden flex-none w-full border-t border-border bg-white overflow-hidden">
    <div class="mx-auto w-full max-w-6xl px-3 sm:px-4 py-2 sm:py-3">
      <div class="flex items-center gap-2 rounded-md border border-border bg-white px-3 py-2 font-mono text-sm sm:text-base text-black shadow-sm">
        <span class="shrink-0 text-blue-700 font-semibold">ProjectAutomata&gt;</span>
        <input id="cli-input" type="text" class="flex-1 bg-transparent text-black font-mono text-sm sm:text-base outline-none border-none p-0 m-0" autocomplete="off" spellcheck="false" aria-label="ProjectAutomata command prompt" />
      </div>
    </div>
  </section>


  <script src="assets/js/grid.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
